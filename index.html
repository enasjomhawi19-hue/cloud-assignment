<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Computing - Practical Assignment</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: #1e293b; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; max-width: 450px; width: 100%; border: 1px solid #334155; }
        .university-title { color: #94a3b8; font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px; font-weight: bold; }
        h1 { color: #38bdf8; font-size: 24px; margin-bottom: 25px; font-weight: 600; letter-spacing: 0.5px; }
        .info-card { background: #0f172a; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: left; border-left: 4px solid #38bdf8; }
        .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; font-weight: bold; }
        .value { font-size: 16px; color: #f1f5f9; margin-top: 5px; font-weight: 500; }
        .clock-box { margin-top: 25px; padding: 15px; background: linear-gradient(135deg, #38bdf8, #0369a1); border-radius: 12px; color: white; }
        .clock-label { font-size: 11px; text-transform: uppercase; opacity: 0.9; font-weight: bold; }
        #clock { font-size: 22px; font-weight: bold; margin-top: 5px; font-family: monospace; }
        footer { margin-top: 20px; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>

    <div class="container">
        <div class="university-title">Jadara University</div>
        <h1>Cloud Computing Assignment</h1>
        
        <div class="info-card">
            <div class="label">Student Name</div>
            <div class="value">Enas Ahmad Jomhawi</div>
        </div>

        <div class="info-card">
            <div class="label">Student ID</div>
            <div class="value">202310710</div>
        </div>

        <div class="info-card">
            <div class="label">Academic Major</div>
            <div class="value">Computer Science</div>
        </div>

        <div class="clock-box">
            <div class="clock-label">Live System Time (Dynamic Feature)</div>
            <div id="clock">00:00:00</div>
        </div>

        <footer>Deployed via PaaS Architecture</footer>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            let seconds = now.getSeconds().toString().padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
